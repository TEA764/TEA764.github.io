<!DOCTYPE html>
<html>
<head>
    <title>TEA764</title>
    <style>
        body {
            margin:0;
            height:100vh;
            background:
                /* 天空 */
                linear-gradient(to bottom, #5c94fc 0%, #5c94fc 70%, #87ceeb 100%),
                /* 地面砖块 */
                repeating-linear-gradient(
                    0deg,
                    #2ecc40,
                    #2ecc40 32px,
                    #27ae36 32px,
                    #27ae36 64px
                );
            background-size: 100% 100%, 64px 32px;
            color:white;
            text-align:center;
            font-family:Arial;
            padding-top:50px;
        }

        h1 {
            font-size:60px;
            margin-bottom:10px;
        }

        p {
            font-size:30px;
            margin-bottom:50px;
        }

        /* 马里奥像素按钮 */
        .pixel-btn {
            width:700px;
            height:110px;
            font-size:50px;
            font-weight:bold;
            border:4px solid black;
            border-radius:0;
            background:#ffd800;
            color:black;
            cursor:pointer;
            box-shadow:6px 6px 0 black;
            margin:20px 0;
            transition: all 0.1s;
            font-family: 'Courier New', monospace;
        }

        /* 按下按钮动画 */
        .pixel-btn:active {
            transform: translate(4px,4px);
            box-shadow:2px 2px 0 black;
        }
    </style>
</head>
<body>

    <h1>人格测试</h1>
    <p>深度思考你的内心人格</p>

    <button class="pixel-btn" onclick="a()">台灯</button>
    <br>
    <button class="pixel-btn" onclick="b()">风扇</button>
    <br>
    <button class="pixel-btn" onclick="c()">纽扣</button>

<script>
function a(){alert("说明你是一个选了台灯的人");}
function b(){alert("说明你是一个选了风扇的人");}
function c(){alert("说明你是一个选了纽扣的人");}
</script>

</body>
</html>
