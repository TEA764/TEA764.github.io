<!DOCTYPE html>
<html>
<head>
    <title>TEA764</title>

    <style>
        body {
            margin:0;
            height:100vh;
            background:
                linear-gradient(to bottom, #5c94fc 0%, #5c94fc 70%, #87ceeb 100%),
                repeating-linear-gradient(
                    0deg,
                    #2ecc40,
                    #2ecc40 32px,
                    #27ae36 32px,
                    #27ae36 64px
                );
            background-size:100% 100%,64px 32px;
            color:white;
            text-align:center;
            font-family:Arial;
            padding-top:50px;
        }

        h1{
            font-size:60px;
        }

        p{
            font-size:30px;
        }

        .pixel-btn{
            width:500px;
            height:110px;
            font-size:65px;
            font-weight:bold;
            border:4px solid black;
            background:#ffd800;
            color:black;
            cursor:pointer;
            box-shadow:6px 6px 0 black;
            margin:20px;
            transition:all 0.1s;
        }

        .pixel-btn:active{
            transform:translate(4px,4px);
            box-shadow:2px 2px 0 black;
        }

        /* 初始隐藏测试界面 */
        #testPage{
            display:none;
        }
    </style>
</head>

<body>

    <!-- 首页 -->
    <div id="startPage">
        <h1>TEA人格测试</h1>
        <p>深度思考你的内心人格</p>

        <button class="pixel-btn" onclick="startTest()">
            开始测试
        </button>
    </div>

    <!-- 测试页 -->
    <div id="testPage">

        <h1>请选择一个物品</h1>

        <button class="pixel-btn" onclick="a()">台 灯</button>
        <br>

        <button class="pixel-btn" onclick="b()">风 扇</button>
        <br>

        <button class="pixel-btn" onclick="c()">纽 扣</button>

    </div>

<script>

function startTest(){

    document.getElementById("startPage").style.display="none";

    document.getElementById("testPage").style.display="block";
}

function a(){
    alert("说明你是一个选了台灯的人");
}

function b(){
    alert("说明你是一个选了风扇的人");
}

function c(){
    alert("说明你是一个选了纽扣的人");
}

</script>

</body>
</html>
